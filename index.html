<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Text Animator Pro - Liz Ducos Edition</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto:wght@100..900&family=Lobster&family=Pacifico&family=Bebas+Neue&family=Monoton&family=Press+Start+2P&family=Righteous&family=Abril+Fatface&family=Comfortaa:wght@300..700&family=Permanent+Marker&family=Playfair+Display:wght@400..900&family=Montserrat:wght@100..900&family=Oswald:wght@200..700&family=Syncopate:wght@400;700&family=Caveat:wght@400..700&family=Orbitron:wght@400..900&family=Cinzel:wght@400..900&family=Anton&family=Satisfy&family=Fredoka+One&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style id="custom-font-style"></style>
    <style id="dynamic-animation-style">
        /* This will hold the active keyframe and the class link */
    </style>
    <style>
        :root {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --accent: #6366f1;
            --text: #e0e0e0;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        .sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .controls { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .instructions { padding: 15px 20px; font-size: 0.75rem; background: #161616; border-top: 1px solid #333; color: #777; }
        .credit { margin-top: 10px; font-size: 0.7rem; color: var(--accent); font-weight: bold; border-top: 1px solid #333; padding-top: 10px; }
        .preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background-color: #ffffff; position: relative; }
        .code-panels { width: 400px; background: var(--sidebar); border-left: 1px solid #333; display: flex; flex-direction: column; }
        
        h3 { font-size: 0.7rem; margin: 20px 0 10px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 6px; color: #999; }
        
        input:not([type="color"]):not([type="radio"]), select { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }

        .radio-group { display: flex; gap: 15px; background: #2a2a2a; padding: 10px; border-radius: 6px; border: 1px solid #444; }
        .radio-option { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 0.75rem; color: #fff; }
        
        .color-row { display: flex; align-items: center; gap: 12px; background: #2a2a2a; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; }
        .color-circle-wrapper { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; border: 2px solid #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        input[type="color"] { border: none; width: 150%; height: 150%; cursor: pointer; transform: scale(1.5); }
        .hex-display { font-family: monospace; font-size: 0.8rem; color: #fff; }

        button { width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: 600; border: none; background: var(--accent); color: white; }
        .btn-copy { background: #444; margin-top: 10px; font-size: 0.8rem; }

        #text-wrap { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; }
        .char { display: inline-block; white-space: pre; }
        textarea { flex: 1; background: #0f0f0f; color: #75beff; border: none; padding: 15px; font-family: monospace; font-size: 11px; resize: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls">
        <h3>Text</h3>
        <input type="text" id="text-input" placeholder="Edit text here..." value="EDIT TEXT">

        <h3>Typography</h3>
        <div class="control-group">
            <label>Font Family</label>
            <select id="font-select">
                <option value="Custom">-- Custom Font URL --</option>
                <optgroup label="Sans Serif">
                    <option value="Inter" selected>Inter</option>
                    <option value="Roboto">Roboto</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                </optgroup>
                <optgroup label="Serif">
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Cinzel">Cinzel</option>
                    <option value="Oswald">Oswald</option>
                </optgroup>
                <optgroup label="Cursive">
                    <option value="Lobster">Lobster</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Satisfy">Satisfy</option>
                    <option value="Caveat">Caveat</option>
                </optgroup>
                <optgroup label="Display / Retro">
                    <option value="Monoton">Monoton</option>
                    <option value="Press Start 2P">Pixel</option>
                    <option value="Orbitron">Orbitron</option>
                    <option value="Righteous">Righteous</option>
                    <option value="Syncopate">Syncopate</option>
                    <option value="Permanent Marker">Marker</option>
                    <option value="Anton">Anton</option>
                </optgroup>
            </select>
        </div>
        
        <div id="custom-font-container" class="control-group" style="display:none;">
            <label>URL (.ttf, .otf, .woff)</label>
            <input type="text" id="custom-font-url" placeholder="https://domain.com/font.ttf">
        </div>

        <div style="display:flex; gap:10px;">
            <div class="control-group"><label>Weight</label><input type="number" id="font-weight" value="400" step="100"></div>
            <div class="control-group"><label>Size</label><input type="number" id="font-size" value="70"></div>
        </div>

        <h3>Design</h3>
        <div class="color-row control-group">
            <div class="color-circle-wrapper"><input type="color" id="text-color" value="#6366f1"></div>
            <span class="hex-display" id="text-hex">#6366F1</span>
        </div>
        <div class="color-row control-group">
            <div class="color-circle-wrapper"><input type="color" id="canvas-color" value="#ffffff"></div>
            <span class="hex-display" id="canvas-hex">#FFFFFF</span>
        </div>

        <h3>Motion Options (20)</h3>
        <div class="control-group">
            <label>Trigger Mode</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="mode-radio" value="loop" checked> Loop</label>
                <label class="radio-option"><input type="radio" name="mode-radio" value="hover"> Hover</label>
            </div>
        </div>
        <div class="control-group">
            <label>Effect</label>
            <select id="anim-select">
                <option value="bounce">Bounce</option>
                <option value="wave">Wave</option>
                <option value="flipX">Flip X</option>
                <option value="flipY">Flip Y</option>
                <option value="zoom">Pulse</option>
                <option value="wobble">Wobble</option>
                <option value="jump">Jump</option>
                <option value="flash">Flash</option>
                <option value="shake">Shake</option>
                <option value="glow">Glow</option>
                <option value="spin">Spin</option>
                <option value="pulse-red">Danger Pulse</option>
                <option value="rubber">Rubber Band</option>
                <option value="blur">Blur</option>
                <option value="skew">Skew</option>
                <option value="float">Float</option>
                <option value="heartBeat">Heart Beat</option>
                <option value="rainbow">Rainbow</option>
                <option value="slideUp">Slide Up</option>
                <option value="swing">Swing</option>
            </select>
        </div>
        <div class="control-group">
            <label>Speed (s)</label>
            <input type="number" id="anim-duration" value="1.5" step="0.1">
        </div>

        <button onclick="exportPNG()">Download PNG</button>
    </div>
    <div class="instructions">
        <strong>Manual:</strong> The Embed Code includes the CSS Keyframes. To use on your site, paste the full snippet into an HTML block.
        <div class="credit">Prompt Engineer: Liz Ducos</div>
    </div>
</div>

<div class="preview-area" id="capture-zone">
    <div id="text-wrap"></div>
</div>

<div class="code-panels">
    <div style="height: 100%; display: flex; flex-direction: column; padding: 15px;">
        <div class="panel-header"><h3>Embed Code</h3><button class="btn-copy" onclick="copyCode()">Copy</button></div>
        <textarea id="embed-code" readonly></textarea>
    </div>
</div>

<script>
    const inputs = ['text-input', 'font-select', 'custom-font-url', 'font-weight', 'font-size', 'text-color', 'canvas-color', 'anim-select', 'anim-duration'];
    
    const keyframeLibrary = {
        'bounce': '@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }',
        'wave': '@keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }',
        'flipX': '@keyframes flipX { 0% { transform: rotateX(0); } 100% { transform: rotateX(360deg); } }',
        'flipY': '@keyframes flipY { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }',
        'zoom': '@keyframes zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }',
        'wobble': '@keyframes wobble { 0% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }',
        'jump': '@keyframes jump { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.2, 0.8); } }',
        'flash': '@keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }',
        'shake': '@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }',
        'glow': '@keyframes glow { 0%, 100% { text-shadow: 0 0 5px currentColor; } 50% { text-shadow: 0 0 20px currentColor; } }',
        'spin': '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }',
        'pulse-red': '@keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: #ff0000; } 100% { transform: scale(1); } }',
        'rubber': '@keyframes rubber { 0% { transform: scale3d(1,1,1); } 30% { transform: scale3d(1.25,.75,1); } 40% { transform: scale3d(.75,1.25,1); } 50% { transform: scale3d(1.15,.85,1); } 100% { transform: scale3d(1,1,1); } }',
        'blur': '@keyframes blur { 0% { filter: blur(0px); } 50% { filter: blur(5px); } 100% { filter: blur(0px); } }',
        'skew': '@keyframes skew { 0% { transform: skew(0deg); } 50% { transform: skew(20deg); } 100% { transform: skew(0deg); } }',
        'float': '@keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(5px, -10px); } 100% { transform: translate(0, 0); } }',
        'heartBeat': '@keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }',
        'rainbow': '@keyframes rainbow { 0% { color: red; } 20% { color: orange; } 40% { color: yellow; } 60% { color: green; } 80% { color: blue; } 100% { color: violet; } }',
        'slideUp': '@keyframes slideUp { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); opacity: 0.5; } 100% { transform: translateY(0); } }',
        'swing': '@keyframes swing { 20% { transform: rotate3d(0, 0, 1, 15deg); } 40% { transform: rotate3d(0, 0, 1, -10deg); } 60% { transform: rotate3d(0, 0, 1, 5deg); } 80% { transform: rotate3d(0, 0, 1, -5deg); } 100% { transform: rotate3d(0, 0, 1, 0deg); } }'
    };

    function update() {
        const text = document.getElementById('text-input').value || " "; 
        const fontSelect = document.getElementById('font-select').value;
        const customUrl = document.getElementById('custom-font-url').value;
        const weight = document.getElementById('font-weight').value;
        const size = document.getElementById('font-size').value + 'px';
        const color = document.getElementById('text-color').value;
        const canvasBg = document.getElementById('canvas-color').value;
        const animName = document.getElementById('anim-select').value;
        const duration = document.getElementById('anim-duration').value + 's';
        
        const mode = document.querySelector('input[name="mode-radio"]:checked').value;

        // Font Logic
        document.getElementById('custom-font-container').style.display = fontSelect === 'Custom' ? 'block' : 'none';
        let fontName = fontSelect;
        let fontFaceRule = "";
        let importRule = "";

        if (fontSelect === 'Custom' && customUrl) {
            fontName = "UserFont";
            fontFaceRule = `@font-face { font-family: 'UserFont'; src: url('${customUrl}'); }`;
            document.getElementById('custom-font-style').innerHTML = fontFaceRule;
        } else {
            importRule = `@import url('https://fonts.googleapis.com/css2?family=${fontSelect.replace(/ /g, '+')}:wght@${weight}');`;
            document.getElementById('custom-font-style').innerHTML = "";
        }

        // Preview Style Injection
        const activeKeyframe = keyframeLibrary[animName];
        let previewCSS = `${activeKeyframe}\n.char { animation-name: ${animName}; animation-duration: ${duration}; }`;
        
        if (mode === 'hover') {
            previewCSS += `\n#text-wrap .char { animation-play-state: paused; }\n#text-wrap:hover .char { animation-play-state: running; animation-iteration-count: infinite; }`;
        } else {
            previewCSS += `\n.char { animation-iteration-count: infinite; }`;
        }
        document.getElementById('dynamic-animation-style').innerHTML = previewCSS;

        // Canvas UI
        document.getElementById('text-hex').textContent = color.toUpperCase();
        document.getElementById('canvas-hex').textContent = canvasBg.toUpperCase();
        document.getElementById('capture-zone').style.backgroundColor = canvasBg;

        // Build Text
        const container = document.getElementById('text-wrap');
        container.innerHTML = '';
        let snippet = '';

        text.split('').forEach((char, i) => {
            const display = char === ' ' ? '&nbsp;' : char;
            const style = `color:${color}; font-size:${size}; font-family:'${fontName}', sans-serif; font-weight:${weight}; animation-delay:${i * 0.1}s;`;
            const span = document.createElement('span');
            span.className = `char`;
            span.style.cssText = style;
            span.innerHTML = display;
            container.appendChild(span);
            snippet += `  <span class="char" style="${style}">${display}</span>\n`;
        });

        // Embed Code Generation
        const embedHoverCSS = mode === 'hover' 
            ? `.text-container .char { animation-play-state: paused; }\n  .text-container:hover .char { animation-play-state: running; animation-iteration-count: infinite; }` 
            : `.char { animation-iteration-count: infinite; }`;

        document.getElementById('embed-code').value = `<style>\n  ${importRule}\n  ${fontFaceRule}\n  .text-container { display:flex; flex-wrap:wrap; justify-content:center; }\n  .char { display: inline-block; white-space: pre; animation-name: ${animName}; animation-duration: ${duration}; }\n  ${embedHoverCSS}\n  ${activeKeyframe}\n</style>\n\n<div class="text-container">\n${snippet}</div>`;
    }

    function exportPNG() {
        html2canvas(document.getElementById('capture-zone')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'design.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function copyCode() {
        const el = document.getElementById("embed-code");
        el.select();
        document.execCommand("copy");
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    }

    // Attach Listeners
    inputs.forEach(id => document.getElementById(id).addEventListener('input', update));
    document.getElementsByName('mode-radio').forEach(r => r.addEventListener('change', update));
    window.onload = update;
</script>

</body>
</html>
