<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Text Animator Pro - Liz Ducos Edition</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto:wght@100..900&family=Lobster&family=Pacifico&family=Bebas+Neue&family=Monoton&family=Press+Start+2P&family=Righteous&family=Abril+Fatface&family=Comfortaa:wght@300..700&family=Permanent+Marker&family=Playfair+Display:wght@400..900&family=Montserrat:wght@100..900&family=Oswald:wght@200..700&family=Syncopate:wght@400;700&family=Caveat:wght@400..700&family=Orbitron:wght@400..900&family=Cinzel:wght@400..900&family=Anton&family=Satisfy&family=Fredoka+One&display=swap">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gifshot@0.4.5/build/gifshot.min.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --accent: #6366f1;
            --text: #e0e0e0;
            --success: #10b981;
            --video-btn: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        .sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .controls { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .instructions { padding: 15px 20px; font-size: 0.75rem; background: #161616; border-top: 1px solid #333; color: #777; }
        .credit { margin-top: 10px; font-size: 0.7rem; color: var(--accent); font-weight: bold; border-top: 1px solid #333; padding-top: 10px; }
        .preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background-color: #ffffff; position: relative; }
        .code-panels { width: 400px; background: var(--sidebar); border-left: 1px solid #333; display: flex; flex-direction: column; }
        h3 { font-size: 0.7rem; margin: 20px 0 10px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 6px; color: #999; }
        input:not([type="color"]), select { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .color-row { display: flex; align-items: center; gap: 12px; background: #2a2a2a; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; }
        .color-circle-wrapper { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; border: 2px solid #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        input[type="color"] { border: none; width: 150%; height: 150%; cursor: pointer; background: none; padding: 0; margin: 0; transform: scale(1.5); }
        .hex-display { font-family: monospace; font-size: 0.8rem; color: #fff; }
        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        button { width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: 600; border: none; transition: 0.2s; }
        .btn-png { background: var(--accent); color: white; }
        .btn-gif { background: var(--success); color: white; }
        .btn-mp4 { background: var(--video-btn); color: white; }
        .btn-copy { background: #444; color: white; margin-top: 10px; font-size: 0.8rem; }
        #text-wrap { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; }
        .char { display: inline-block; white-space: pre; }
        textarea { flex: 1; background: #0f0f0f; color: #75beff; border: none; padding: 15px; font-family: monospace; font-size: 11px; resize: none; }

        /* Keyframes - Same 20 as before */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }
        @keyframes flipX { 0% { transform: rotateX(0); } 100% { transform: rotateX(360deg); } }
        @keyframes flipY { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
        @keyframes zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        @keyframes wobble { 0% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        @keyframes jump { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.2, 0.8); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px currentColor; } 50% { text-shadow: 0 0 20px currentColor; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: #ff0000; } 100% { transform: scale(1); } }
        @keyframes rubber { 0% { transform: scale3d(1,1,1); } 30% { transform: scale3d(1.25,.75,1); } 40% { transform: scale3d(.75,1.25,1); } 50% { transform: scale3d(1.15,.85,1); } 100% { transform: scale3d(1,1,1); } }
        @keyframes blur { 0% { filter: blur(0px); } 50% { filter: blur(5px); } 100% { filter: blur(0px); } }
        @keyframes skew { 0% { transform: skew(0deg); } 50% { transform: skew(20deg); } 100% { transform: skew(0deg); } }
        @keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(5px, -10px); } 100% { transform: translate(0, 0); } }
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
        @keyframes rainbow { 0% { color: red; } 20% { color: orange; } 40% { color: yellow; } 60% { color: green; } 80% { color: blue; } 100% { color: violet; } }
        @keyframes slideUp { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); opacity: 0.5; } 100% { transform: translateY(0); } }
        @keyframes swing { 20% { transform: rotate3d(0, 0, 1, 15deg); } 40% { transform: rotate3d(0, 0, 1, -10deg); } 60% { transform: rotate3d(0, 0, 1, 5deg); } 80% { transform: rotate3d(0, 0, 1, -5deg); } 100% { transform: rotate3d(0, 0, 1, 0deg); } }

        .anim-bounce { animation: bounce 1s infinite; }
        .anim-wave { animation: wave 1s infinite; }
        .anim-flipX { animation: flipX 1.5s infinite linear; }
        .anim-flipY { animation: flipY 1.5s infinite linear; }
        .anim-zoom { animation: zoom 1.5s infinite; }
        .anim-wobble { animation: wobble 0.8s infinite; }
        .anim-jump { animation: jump 0.6s infinite; }
        .anim-flash { animation: flash 1s infinite; }
        .anim-shake { animation: shake 0.3s infinite; }
        .anim-glow { animation: glow 1.5s infinite; }
        .anim-spin { animation: spin 2s infinite linear; }
        .anim-pulse-red { animation: pulse-red 1s infinite; }
        .anim-rubber { animation: rubber 1s infinite; }
        .anim-blur { animation: blur 2s infinite; }
        .anim-skew { animation: skew 1.2s infinite; }
        .anim-float { animation: float 2s infinite ease-in-out; }
        .anim-heartBeat { animation: heartBeat 1.3s infinite; }
        .anim-rainbow { animation: rainbow 3s infinite linear; }
        .anim-slideUp { animation: slideUp 1s infinite; }
        .anim-swing { animation: swing 1s infinite; transform-origin: top center; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls">
        <h3>Text</h3>
        <input type="text" id="text-input" placeholder="Edit text here..." value="">

        <h3>Typography</h3>
        <div class="control-group">
            <label>Font Family</label>
            <select id="font-select">
                <option value="Inter">Inter</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Lobster">Lobster</option>
                <option value="Orbitron">Orbitron</option>
                <option value="Press Start 2P">Pixel</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="control-group"><label>Size</label><input type="number" id="font-size" value="70"></div>
            <div class="control-group"><label>Spacing</label><input type="number" id="letter-spacing" value="2"></div>
        </div>

        <h3>Colors</h3>
        <div class="control-group">
            <label>Text Color</label>
            <div class="color-row">
                <div class="color-circle-wrapper"><input type="color" id="text-color" value="#6366f1"></div>
                <span class="hex-display" id="text-hex">#6366F1</span>
            </div>
        </div>
        <div class="control-group">
            <label>Canvas Color</label>
            <div class="color-row">
                <div class="color-circle-wrapper"><input type="color" id="canvas-color" value="#ffffff"></div>
                <span class="hex-display" id="canvas-hex">#FFFFFF</span>
            </div>
        </div>

        <h3>Motion</h3>
        <select id="anim-select">
            <option value="anim-bounce">Bounce</option>
            <option value="anim-rainbow">Rainbow</option>
            <option value="anim-float">Float</option>
            <option value="anim-wobble">Wobble</option>
        </select>

        <div class="btn-stack">
            <button class="btn-png" onclick="exportPNG()">Download PNG</button>
            <button class="btn-gif" id="gif-btn" onclick="exportGIF()">Generate GIF</button>
            <button class="btn-mp4" id="mp4-btn" onclick="exportMP4()">Download MP4</button>
        </div>
    </div>
    <div class="instructions">
        <strong>Manual:</strong> Use MP4 for high-quality social sharing. Recording takes 3 seconds.
        <div class="credit">Prompt Engineer: Liz Ducos</div>
    </div>
</div>

<div class="preview-area" id="capture-zone">
    <div id="text-wrap"></div>
</div>

<div class="code-panels">
    <div style="height: 100%; display: flex; flex-direction: column; padding: 15px;">
        <div class="panel-header"><h3>Embed Code</h3><button class="btn-copy" onclick="copyCode()">Copy</button></div>
        <textarea id="embed-code" readonly></textarea>
    </div>
</div>

<script>
    const quirkyWords = ["BAMBOOZLED", "SKEDADDLE", "HULLABALOO", "KERFUFFLE", "LALLYGAG", "MALARKEY", "GIBBERISH", "SHENANIGANS", "DOODAD", "WHIPPERSNAPPER"];
    const inputs = ['text-input', 'font-select', 'font-size', 'letter-spacing', 'text-color', 'canvas-color', 'anim-select'];

    const keyframeLibrary = {
        'anim-bounce': '@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }',
        'anim-rainbow': '@keyframes rainbow { 0% { color: red; } 20% { color: orange; } 40% { color: yellow; } 60% { color: green; } 80% { color: blue; } 100% { color: violet; } }',
        'anim-float': '@keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(5px, -10px); } 100% { transform: translate(0, 0); } }',
        'anim-wobble': '@keyframes wobble { 0% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }'
    };

    function init() {
        document.getElementById('text-input').value = quirkyWords[Math.floor(Math.random() * quirkyWords.length)];
        update();
    }

    function update() {
        const text = document.getElementById('text-input').value || " "; 
        const font = document.getElementById('font-select').value;
        const size = document.getElementById('font-size').value + 'px';
        const color = document.getElementById('text-color').value;
        const canvas = document.getElementById('canvas-color').value;
        const anim = document.getElementById('anim-select').value;

        document.getElementById('text-hex').textContent = color.toUpperCase();
        document.getElementById('canvas-hex').textContent = canvas.toUpperCase();
        document.getElementById('capture-zone').style.backgroundColor = canvas;

        const container = document.getElementById('text-wrap');
        container.innerHTML = '';
        text.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.className = `char ${anim}`;
            span.style.cssText = `color:${color}; font-size:${size}; font-family:'${font}', sans-serif; animation-delay:${i * 0.1}s;`;
            span.innerHTML = char === ' ' ? '&nbsp;' : char;
            container.appendChild(span);
        });
    }

    async function exportMP4() {
        const btn = document.getElementById('mp4-btn');
        btn.innerText = "Recording (3s)...";
        btn.disabled = true;

        const captureZone = document.getElementById('capture-zone');
        const canvas = await html2canvas(captureZone);
        const stream = canvas.captureStream(30); 
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); 
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'animation.mp4';
            a.click();
            btn.innerText = "Download MP4";
            btn.disabled = false;
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 3000); 
    }

    // Other functions (PNG, GIF, Copy) remain the same
    async function exportPNG() {
        const canvas = await html2canvas(document.getElementById('capture-zone'));
        const link = document.createElement('a');
        link.download = 'design.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function exportGIF() {
        gifshot.createGIF({
            gifWidth: 800,
            gifHeight: 400,
            htmlElement: document.getElementById('capture-zone'),
            numFrames: 15
        }, function(obj) {
            if(!obj.error) {
                const link = document.createElement('a');
                link.download = 'animation.gif';
                link.href = obj.image;
                link.click();
            }
        });
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', update));
    window.onload = init;
</script>

</body>
</html>
