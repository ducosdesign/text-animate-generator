<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Text Animator & Exporter</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --sidebar: #252526;
            --panel: #2d2d30;
            --accent: #007acc;
            --text: #cccccc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Layout */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444;
        }

        .controls {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .instructions {
            padding: 20px;
            font-size: 0.8rem;
            background: #1e1e1e;
            border-top: 1px solid #444;
            color: #888;
        }

        .preview-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        .code-panels {
            width: 400px;
            background: var(--sidebar);
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        /* UI Styling */
        h3 { font-size: 0.8rem; margin: 15px 0 8px 0; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #aaa; }
        
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 8px; background: #3c3c3c; border: 1px solid #555; color: #fff; border-radius: 4px;
        }

        /* Color Picker Styling */
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #3c3c3c;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #555;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #555; border-radius: 50%; }

        button {
            width: 100%; padding: 10px; margin-top: 10px; cursor: pointer;
            border-radius: 4px; font-weight: bold; border: none; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #444; color: white; }

        /* The Animated Text */
        #text-wrap { display: flex; flex-wrap: wrap; justify-content: center; }
        .char { display: inline-block; white-space: pre; transition: 0.3s; }

        /* Animation Library */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fade { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        @keyframes skew { 0%, 100% { transform: skewX(0deg); } 50% { transform: skewX(30deg); } }
        @keyframes flip { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0); } }

        .anim-bounce { animation: bounce 0.8s infinite; }
        .anim-spin { animation: spin 1.5s infinite linear; }
        .anim-fade { animation: fade 1.5s infinite; }
        .anim-pulse { animation: pulse 1s infinite; }
        .anim-skew { animation: skew 1s infinite; }
        .anim-flip { animation: flip 2s infinite; }
        .anim-float { animation: float 2s infinite ease-in-out; }

        textarea {
            flex: 1; background: #1e1e1e; color: #9cdcfe; border: none; padding: 10px;
            font-family: monospace; font-size: 11px; resize: none;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls">
        <h3>Text Content</h3>
        <div class="control-group">
            <input type="text" id="text-input" value="STYLE">
        </div>

        <h3>Typography</h3>
        <div class="control-group">
            <label>Font Family</label>
            <select id="font-select">
                <option value="Roboto">Roboto</option>
                <option value="Lobster">Lobster</option>
                <option value="Pacifico">Pacifico</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Monoton">Monoton</option>
            </select>
        </div>
        <div class="control-group">
            <label>Size (px)</label>
            <input type="number" id="global-size" value="80">
        </div>

        <h3>Design</h3>
        <div class="control-group">
            <label>Font Color</label>
            <div class="color-picker-container">
                <input type="color" id="global-color" value="#007acc">
                <span id="color-hex">#007acc</span>
            </div>
        </div>
        <div class="control-group">
            <label>Canvas Color</label>
            <div class="color-picker-container">
                <input type="color" id="canvas-color" value="#ffffff">
                <span id="canvas-hex">#ffffff</span>
            </div>
        </div>
        <div class="control-group">
            <label>Stroke (Width & Color)</label>
            <div class="flex">
                <input type="number" id="stroke-width" value="0" min="0" style="width: 60px;">
                <input type="color" id="stroke-color" value="#000000" style="flex-grow:1; height:36px;">
            </div>
        </div>

        <h3>Motion</h3>
        <div class="control-group">
            <select id="animation-select">
                <option value="">No Animation</option>
                <option value="anim-bounce">Bounce</option>
                <option value="anim-spin">Spin</option>
                <option value="anim-fade">Fade</option>
                <option value="anim-pulse">Pulse</option>
                <option value="anim-skew">Skew</option>
                <option value="anim-flip">Flip</option>
                <option value="anim-float">Float</option>
            </select>
        </div>

        <button class="btn-primary" onclick="exportImage()">Download PNG</button>
    </div>

    <div class="instructions">
        <strong>Instructions:</strong><br>
        1. Edit text and font settings.<br>
        2. Click color circles to change theme.<br>
        3. Select animation for live preview.<br>
        4. Copy the embed code from the right panel to use on your site.
    </div>
</div>

<div class="preview-area" id="preview-screen">
    <div id="text-wrap"></div>
</div>

<div class="code-panels">
    <div style="height: 50%; display: flex; flex-direction: column; padding: 15px;">
        <h3>Embed HTML</h3>
        <textarea id="embed-code" readonly></textarea>
    </div>
    <div style="height: 50%; display: flex; flex-direction: column; padding: 15px; border-top: 1px solid #444;">
        <h3>Essential CSS</h3>
        <textarea id="css-code" readonly></textarea>
    </div>
</div>

<script>
    const inputs = ['text-input', 'font-select', 'global-size', 'global-color', 'canvas-color', 'stroke-width', 'stroke-color', 'animation-select'];

    function update() {
        const text = document.getElementById('text-input').value;
        const font = document.getElementById('font-select').value;
        const size = document.getElementById('global-size').value + 'px';
        const color = document.getElementById('global-color').value;
        const canvasColor = document.getElementById('canvas-color').value;
        const sWidth = document.getElementById('stroke-width').value + 'px';
        const sColor = document.getElementById('stroke-color').value;
        const anim = document.getElementById('animation-select').value;

        // Update Labels & UI
        document.getElementById('color-hex').textContent = color.toUpperCase();
        document.getElementById('canvas-hex').textContent = canvasColor.toUpperCase();
        document.getElementById('preview-screen').style.backgroundColor = canvasColor;
        document.getElementById('google-font-link').href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g, '+')}&display=swap`;

        const container = document.getElementById('text-wrap');
        container.innerHTML = '';
        let htmlSnippet = '';

        text.split('').forEach((char, i) => {
            const display = char === ' ' ? '&nbsp;' : char;
            const style = `color:${color}; font-size:${size}; font-family:'${font}', sans-serif; -webkit-text-stroke:${sWidth} ${sColor}; animation-delay:${i * 0.1}s;`;
            
            const span = document.createElement('span');
            span.className = `char ${anim}`;
            span.style.cssText = style;
            span.innerHTML = display;
            container.appendChild(span);
            htmlSnippet += `<span class="char ${anim}" style="${style}">${display}</span>`;
        });

        document.getElementById('embed-code').value = `<div class="anim-container">\n  ${htmlSnippet}\n</div>`;
        document.getElementById('css-code').value = `.char { display: inline-block; }\n/* Include the keyframes for ${anim} from the tool source */`;
    }

    async function exportImage() {
        const canvas = await html2canvas(document.getElementById('preview-screen'));
        const link = document.createElement('a');
        link.download = 'my-text-design.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', update));
    update();
</script>

</body>
</html>
