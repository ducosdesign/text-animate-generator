<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Text Animator Pro</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&family=Lobster&family=Pacifico&family=Bebas+Neue&family=Monoton&family=Press+Start+2P&family=Righteous&family=Abril+Fatface&family=Comfortaa&family=Permanent+Marker&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --accent: #6366f1;
            --text: #e0e0e0;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .controls { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .instructions { padding: 15px 20px; font-size: 0.75rem; background: #161616; border-top: 1px solid #333; color: #777; }

        .preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background-color: #ffffff; position: relative; }
        .code-panels { width: 400px; background: var(--sidebar); border-left: 1px solid #333; display: flex; flex-direction: column; }

        h3 { font-size: 0.7rem; margin: 20px 0 10px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 6px; color: #999; }
        
        input, select { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }

        .color-row { display: flex; align-items: center; justify-content: space-between; background: #2a2a2a; padding: 6px 10px; border-radius: 6px; border: 1px solid #444; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 28px; height: 28px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #666; border-radius: 50%; }

        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        button { width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: 600; border: none; transition: 0.2s; }
        .btn-png { background: var(--accent); color: white; }
        .btn-gif { background: var(--success); color: white; }
        .btn-copy { background: #444; color: white; margin-top: 10px; font-size: 0.8rem; }
        .btn-copy:hover { background: #555; }

        #text-wrap { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; }
        .char { display: inline-block; white-space: pre; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; padding-right: 15px; }
        textarea { flex: 1; background: #0f0f0f; color: #75beff; border: none; padding: 15px; font-family: monospace; font-size: 11px; resize: none; }

        /* Animations */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }
        @keyframes flip { 0% { transform: rotateX(0); } 100% { transform: rotateX(360deg); } }
        @keyframes zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        @keyframes wobble { 0% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        @keyframes jump { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.2, 0.8); } }

        .anim-bounce { animation: bounce 1s infinite; }
        .anim-wave { animation: wave 1s infinite; }
        .anim-flip { animation: flip 2s infinite linear; }
        .anim-zoom { animation: zoom 1.5s infinite; }
        .anim-wobble { animation: wobble 0.8s infinite; }
        .anim-jump { animation: jump 0.6s infinite; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls">
        <h3>Text</h3>
        <input type="text" id="text-input" value="COPY ME">

        <h3>Typography</h3>
        <div class="control-group">
            <label>Font</label>
            <select id="font-select">
                <option value="Roboto">Roboto</option>
                <option value="Lobster">Lobster</option>
                <option value="Pacifico">Pacifico</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Press Start 2P">Pixel</option>
                <option value="Righteous">Righteous</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="control-group"><label>Size</label><input type="number" id="font-size" value="70"></div>
            <div class="control-group"><label>Spacing</label><input type="number" id="letter-spacing" value="5"></div>
        </div>
        <div class="control-group"><label>Line Height</label><input type="number" id="line-height" value="1.2" step="0.1"></div>

        <h3>Colors</h3>
        <div class="control-group"><label>Text</label><div class="color-row"><input type="color" id="text-color" value="#6366f1"> <span id="text-hex">#6366F1</span></div></div>
        <div class="control-group"><label>Canvas</label><div class="color-row"><input type="color" id="canvas-color" value="#ffffff"> <span id="canvas-hex">#FFFFFF</span></div></div>

        <h3>Motion</h3>
        <select id="anim-select">
            <option value="">Static</option>
            <option value="anim-bounce">Bounce</option>
            <option value="anim-wave">Wave</option>
            <option value="anim-flip">Flip 3D</option>
            <option value="anim-zoom">Pulse</option>
            <option value="anim-wobble">Wobble</option>
            <option value="anim-jump">Jump</option>
        </select>

        <div class="btn-stack">
            <button class="btn-png" onclick="exportPNG()">Download PNG</button>
            <button class="btn-gif" id="gif-btn" onclick="exportGIF()">Generate GIF</button>
        </div>
    </div>
    <div class="instructions">
        <strong>Manual:</strong> The Embed Code includes the CSS Keyframes. To use on your site, paste the full snippet into an HTML block.
    </div>
</div>

<div class="preview-area" id="capture-zone">
    <div id="text-wrap"></div>
</div>

<div class="code-panels">
    <div style="height: 100%; display: flex; flex-direction: column; padding: 15px;">
        <div class="panel-header">
            <h3>Embed Code</h3>
            <button class="btn-copy" onclick="copyCode()">Copy Code</button>
        </div>
        <textarea id="embed-code" readonly></textarea>
    </div>
</div>

<script>
    const inputs = ['text-input', 'font-select', 'font-size', 'letter-spacing', 'line-height', 'text-color', 'canvas-color', 'anim-select'];

    const keyframeLibrary = {
        'anim-bounce': '@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }',
        'anim-wave': '@keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }',
        'anim-flip': '@keyframes flip { 0% { transform: rotateX(0); } 100% { transform: rotateX(360deg); } }',
        'anim-zoom': '@keyframes zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }',
        'anim-wobble': '@keyframes wobble { 0% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }',
        'anim-jump': '@keyframes jump { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.2, 0.8); } }'
    };

    function update() {
        const text = document.getElementById('text-input').value;
        const font = document.getElementById('font-select').value;
        const size = document.getElementById('font-size').value + 'px';
        const spacing = document.getElementById('letter-spacing').value + 'px';
        const lh = document.getElementById('line-height').value;
        const color = document.getElementById('text-color').value;
        const canvas = document.getElementById('canvas-color').value;
        const anim = document.getElementById('anim-select').value;

        document.getElementById('text-hex').textContent = color.toUpperCase();
        document.getElementById('canvas-hex').textContent = canvas.toUpperCase();
        document.getElementById('capture-zone').style.backgroundColor = canvas;

        const container = document.getElementById('text-wrap');
        container.innerHTML = '';
        let snippet = '';

        text.split('').forEach((char, i) => {
            const display = char === ' ' ? '&nbsp;' : char;
            const style = `color:${color}; font-size:${size}; font-family:'${font}', sans-serif; letter-spacing:${spacing}; line-height:${lh}; animation-delay:${i * 0.1}s;`;
            
            const span = document.createElement('span');
            span.className = `char ${anim}`;
            span.style.cssText = style;
            span.innerHTML = display;
            container.appendChild(span);
            snippet += `  <span class="char ${anim}" style="${style}">${display}</span>\n`;
        });

        const activeKeyframes = keyframeLibrary[anim] || '';
        const fullEmbed = `<style>
  @import url('https://fonts.googleapis.com/css2?family=${font.replace(/ /g, '+')}');
  .char { display: inline-block; white-space: pre; }
  .${anim} { animation: ${anim.replace('anim-', '')} 1s infinite; }
  ${activeKeyframes}
</style>

<div style="display:flex; flex-wrap:wrap; justify-content:center;">
${snippet}</div>`;

        document.getElementById('embed-code').value = fullEmbed;
    }

    function copyCode() {
        const copyText = document.getElementById("embed-code");
        copyText.select();
        document.execCommand("copy");
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy Code", 2000);
    }

    async function exportPNG() {
        const canvas = await html2canvas(document.getElementById('capture-zone'));
        const link = document.createElement('a');
        link.download = 'text-design.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function exportGIF() {
        const btn = document.getElementById('gif-btn');
        btn.innerText = "Capturing...";
        btn.disabled = true;
        gifshot.createGIF({
            gifWidth: 800,
            gifHeight: 400,
            htmlElement: document.getElementById('capture-zone'),
            numFrames: 15,
            frameDuration: 1
        }, function(obj) {
            if(!obj.error) {
                const link = document.createElement('a');
                link.download = 'animation.gif';
                link.href = obj.image;
                link.click();
            }
            btn.innerText = "Generate GIF";
            btn.disabled = false;
        });
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', update));
    update();
</script>

</body>
</html>
